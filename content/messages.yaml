# ===========================================================================
# ВСЕ ТЕКСТЫ БОТА — CRM-цепочка «5 навыков мозга», Центр Интеллекта «Синергия».
# Верстально повторяют Promo Sequence v3 (TG1, TG1a, TG2, TG3, TG4, TG5, TG6).
#
# Правь только значения справа от двоеточия. Ключи (слова слева) не трогай.
# Отступы — только пробелами. Табы не работают.
#
# Плейсхолдеры в фигурных скобках подставляются автоматически:
#   {first_name}     — имя пользователя из Telegram
#   {webinar_date}   — дата вебинара: «25 апреля»
#   {webinar_time}   — время МСК: «19:00»
#   {webinar_url}    — ссылка на эфир (из ENV WEBINAR_URL)
#   {course_url}     — ссылка на бесплатный курс «Прокачка мозга»
#                      (из ENV COURSE_URL — только для TG6)
# ===========================================================================

# -----------------------------
# TG1 + TG1a — мгновенно при /start
# -----------------------------
tg1:
  text: |
    Здравствуйте.

    Вы в списке на мастер-класс <b>«5 навыков мозга, которые определяют всё»</b>.

    📅 Эфир: {webinar_date}, {webinar_time} по Москве
    ⏱ Длительность: около 75 минут

    Этот бот:
    — Сейчас отдаст PDF-бонус за регистрацию
    — За 30 минут до эфира пришлёт ссылку
    — После эфира откроет два бонуса за участие

    Лишних сообщений не будет.

tg1a:
  caption: |
    📄 <b>«Карта из 5 шагов»</b> — ваш бонус за регистрацию.

    Пять направлений с эфира: концентрация, память, скорость мышления, скорость чтения, когнитивный резерв. По каждому — короткий чек-лист для самодиагностики.

    Пройдитесь до эфира — разбор сядет глубже.

# -----------------------------
# Повторный /start для уже зарегистрированных
# -----------------------------
already_registered:
  text: |
    Вы уже в списке на мастер-класс <b>«5 навыков мозга»</b>.

    📅 Эфир: {webinar_date}, {webinar_time} по Москве

    За 30 минут до начала пришлю ссылку. В финале — два бонуса за участие.

# -----------------------------
# Отложенные напоминания TG2 → TG5
# -----------------------------
reminders:
  TG2:
    text: |
      Сегодня в <b>{webinar_time} по Москве</b> — мастер-класс «5 навыков мозга».

      Ссылку пришлём сюда за 30 минут до начала. В финале — два бонуса за участие.
  TG3:
    text: |
      До старта — <b>30 минут</b>.

      Откройте ссылку сейчас и оставьте вкладку открытой.
    button_text: "▶️ Открыть эфир"
  TG4:
    text: |
      Начинаем через <b>5 минут</b>.

      Если вкладка ещё не открыта — самое время.
    button_text: "▶️ Открыть эфир"
  TG5:
    text: |
      Эфир закончился. Спасибо, что были.

      В финале Ольга открыла два бонуса для всех, кто дошёл до конца:

      — Бесплатный 6-дневный курс <b>«Прокачка мозга»</b> (15 минут в день)
      — Чек-лист <b>«30 дней прокачки мозга»</b> (ежедневный протокол действий)

      Чтобы получить оба — отправьте в этот чат одно слово:

      <b>ПРОКАЧКА</b>

      Слово работает в любой момент.

# -----------------------------
# TG6 — реакция на кодовое слово ПРОКАЧКА
# -----------------------------
secret_word_reply:
  text: |
    Готово. Держите бонусы.

    🎓 <b>1. Бесплатный 6-дневный курс «Прокачка мозга»</b>

    Зарегистрируйтесь по кнопке ниже — первый день откроется сразу. Следующие дни будут открываться автоматически в 09:00 по Москве.

    📄 <b>2. Чек-лист «30 дней прокачки мозга»</b>

    Файл придёт следующим сообщением. Это план ежедневных действий — какое упражнение делать в какой день, по одному из пяти направлений.

    Спасибо, что дошли до конца.
  button_text: "▶️ Зарегистрироваться на курс"
  checklist_caption: "📄 Чек-лист «30 дней прокачки мозга»"

# -----------------------------
# Ответ на любой другой ввод
# -----------------------------
fallback:
  text: |
    Чтобы получить бонусы, отправьте слово <b>ПРОКАЧКА</b>.

# ===========================================================================
# ТАЙМИНГИ (меняй только если точно понимаешь, что делаешь).
# Время — в часовом поясе Москвы. Вебинар всегда = день регистрации + 1 день.
# ===========================================================================
timings:
  webinar_hour_msk: 19
  webinar_minute_msk: 0
  TG2_hour_msk: 10           # утро дня вебинара
  TG3_minutes_before: 30     # "открывайте" — за 30 минут до эфира
  TG4_minutes_before: 5      # "начинаем через 5 минут"
  TG5_minutes_after: 90      # "эфир закончился" — через 1.5 часа после старта
