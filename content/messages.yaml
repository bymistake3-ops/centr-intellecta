# ===========================================================================
# ВСЕ ТЕКСТЫ БОТА.
# Правь только значения справа от двоеточия. Ключи (слова слева) не трогай.
# Отступы — только пробелами (4 или 2 — как уже стоит). Табы не работают.
#
# Плейсхолдеры в фигурных скобках подставляются автоматически:
#   {first_name}       — имя пользователя из Telegram
#   {webinar_date}     — дата вебинара в формате "25 апреля"
#   {webinar_time}     — время МСК в формате "19:00"
#   {webinar_url}      — ссылка на эфир (из ENV)
#   {record_url}       — ссылка на запись (из ENV)
#   {free_course_url}  — ссылка на бесплатный курс (из ENV)
# ===========================================================================

welcome:
  text: |
    Привет, {first_name}! 🎓

    Ты записан на автовебинар <b>{webinar_date} в {webinar_time} МСК</b>.

    Перед эфиром я пришлю несколько напоминаний, чтобы ты точно не забыл.
    А пока держи обещанный бонус — PDF-файл ниже.
  pdf_caption: "Твой бонус за регистрацию"

already_registered:
  text: |
    {first_name}, ты уже записан.
    Вебинар <b>{webinar_date} в {webinar_time} МСК</b>.

    До встречи в эфире!

reminders:
  T1:
    text: |
      {first_name}, напоминаю: завтра в <b>{webinar_time} МСК</b> встречаемся на вебинаре.

      Обязательно поставь напоминание в календарь — будет ценно.
  T2:
    text: |
      Сегодня в <b>{webinar_time} МСК</b> мы в эфире.

      Готовь чай, блокнот и выдели 1,5 часа — расскажу самое важное.
  T3:
    text: |
      {first_name}, через час стартуем!

      Вот ссылка на эфир:
      {webinar_url}
  T4:
    text: |
      🔥 Стартуем через 5 минут!

      Заходи сюда:
      {webinar_url}
  T5:
    text: |
      Эфир идёт прямо сейчас. Ещё не поздно присоединиться:
      {webinar_url}
  T6:
    text: |
      {first_name}, если не успел посмотреть — держи запись вебинара:
      {record_url}

      Запись доступна ограниченное время. Посмотри, пока тёплая.

secret_word_reply:
  text: |
    Поймал кодовое слово! 🎁

    Вот обещанный бесплатный курс:
    {free_course_url}

    Приятного обучения!

fallback:
  text: |
    Я простой бот 🤖

    Нажми /start, чтобы записаться на вебинар, или введи кодовое слово,
    если знаешь его.

waiting_contact_hint:
  text: |
    Чтобы продолжить, нажми кнопку <b>«Поделиться номером»</b> внизу.
    Номер нужен, чтобы отправить тебе напоминания о вебинаре.

# ===========================================================================
# ТАЙМИНГИ НАПОМИНАНИЙ (меняй только если точно понимаешь, что делаешь).
# Все значения — в часовом поясе Москвы.
# ===========================================================================
timings:
  webinar_hour_msk: 19
  webinar_minute_msk: 0
  T1_hour_msk: 20       # вечер дня регистрации
  T2_hour_msk: 10       # утро дня вебинара
  T3_minutes_before: 60
  T4_minutes_before: 5
  T5_minutes_after: 30
  T6_hours_after: 24
